<!DOCTYPE html>
<html>
<head>
  <title>NASA Search</title>
</head>
<body>
  <h1>Search NASA</h1>
  <input id="query" placeholder="Search..." />
  <button onclick="runSearch()">Go</button>

  <ul id="results"></ul>

  <script>
    let index = [];

    async function loadIndex() {
      const res = await fetch("index.json");
      index = await res.json();
    }

    function runSearch() {
      const q = document.getElementById("query").value.toLowerCase();
      const results = document.getElementById("results");
      results.innerHTML = "";

      const matches = index.filter(page =>
        page.content.toLowerCase().includes(q)
      );

      matches.slice(0, 10).forEach(page => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${page.url}" target="_blank">${page.title}</a>`;
        results.appendChild(li);
      });
    }

    loadIndex();
  </script>
</body>
</html>
